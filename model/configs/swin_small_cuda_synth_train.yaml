encoder:
  encoder_type: swin
  image_height: 192
  image_width: 384
  patch_size: 4
  in_channels: 1
  embed_dim: 48
  depths: [2, 2, 4, 2]
  num_heads: [2, 4, 6, 12]
  window_size: 7
  mlp_ratio: 4.0
  drop_rate: 0.0
  attn_drop_rate: 0.0
  drop_path_rate: 0.1

decoder:
  vocab_size: 356
  max_seq_len: 256
  d_model: 256
  nhead: 8
  num_layers: 4
  dim_feedforward: 1024
  dropout: 0.1

train:
  batch_size: 64
  num_epochs: 50
  learning_rate: 3.0e-4
  weight_decay: 0.01
  warmup_steps: 300
  label_smoothing: 0.1
  grad_clip: 1.0
  fp16: true
  num_workers: 12
  save_every: 5
  eval_every: 2
  eval_generate_start_epoch: 5
  val_max_generate: 64
  val_max_len: 256
  patience: 10
  checkpoint_dir: checkpoints/swin_small_cuda_synth
  log_dir: logs/swin_small_cuda_synth
  wandb_project: null

data:
  train_dir: data/processed_synth/train
  val_dir: data/processed_synth/val
  test_dir: data/processed_synth/test
  vocab_path: model/vocab.json
  image_height: 192
  image_width: 384
  max_seq_len: 256
  preprocessed_images: true
